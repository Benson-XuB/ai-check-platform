# 一键：docker compose up --build -d
# 在项目根目录放置 .env（可复制 .env.example），Compose 会自动读入并传入容器
#
# 默认只拉起 ai-pr-review + saas-api。prelaunch-api 会安装 semgrep/bandit 等大依赖，构建很慢，
# 已归入 profile「prelaunch」；需要整仓扫描时再执行：
#   docker compose --profile prelaunch up -d
# 或仅构建/启动 SaaS（最快）：
#   docker compose up -d saas-api

services:
  ai-pr-review:
    build:
      context: .
      args:
        USE_CN_APT_MIRROR: ${USE_CN_APT_MIRROR:-}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
    image: ai-pr-review:latest
    container_name: ai-pr-review
    # Linux 上容器访问宿主机 PostgreSQL：DATABASE_URL 主机用 host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${HOST_PORT:-8000}:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      GITEE_TOKEN: ${GITEE_TOKEN:-}
      GITEE_WEBHOOK_SECRET: ${GITEE_WEBHOOK_SECRET:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      WEBHOOK_LLM_PROVIDER: ${WEBHOOK_LLM_PROVIDER:-}
      DATABASE_URL: ${DATABASE_URL:-}
      # 容器内默认可写路径；持久化可改为挂载宿主机目录并同步修改 PRELAUNCH_WORKSPACE
      PRELAUNCH_WORKSPACE: ${PRELAUNCH_WORKSPACE:-/tmp/prelaunch}
    # 挂载 static：改 HTML/CSS 后无需重建镜像即可更新 /manual 等页面（与镜像内 /app/static 二选一，挂载优先）
    volumes:
      - ./static:/app/static:ro
    restart: unless-stopped

  saas-api:
    build:
      context: .
      dockerfile: Dockerfile.saas
      args:
        # 构建阶段：国内建议1，apt 换清华 Debian 源（否则 apt 走 deb.debian.org 很慢）
        USE_CN_APT_MIRROR: ${USE_CN_APT_MIRROR:-}
        # 构建阶段 pip 用（弱网可设清华源等，见 Dockerfile.saas 注释）
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
    image: ai-pr-review-saas:latest
    container_name: ai-pr-review-saas
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${SAAS_HOST_PORT:-8001}:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: ${DATABASE_URL:-}
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-change-in-production}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:${SAAS_HOST_PORT:-8001}}
      SESSION_HTTPS_ONLY: ${SESSION_HTTPS_ONLY:-}
      # Gitee OAuth：须从宿主机 .env 经 Compose 传入容器（镜像内不含 .env）
      GITEE_OAUTH_CLIENT_ID: ${GITEE_OAUTH_CLIENT_ID:-}
      GITEE_OAUTH_CLIENT_SECRET: ${GITEE_OAUTH_CLIENT_SECRET:-}
      GITEE_OAUTH_REDIRECT_URI: ${GITEE_OAUTH_REDIRECT_URI:-}
      GITEE_OAUTH_SCOPES: ${GITEE_OAUTH_SCOPES:-}
      GITEE_HTTP_TIMEOUT_SEC: ${GITEE_HTTP_TIMEOUT_SEC:-}
      GITEE_HTTP_RETRIES: ${GITEE_HTTP_RETRIES:-}
      GITEE_HTTPS_PROXY: ${GITEE_HTTPS_PROXY:-}
      GITEE_WEBHOOK_SECRET: ${GITEE_WEBHOOK_SECRET:-}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GITHUB_APP_SLUG: ${GITHUB_APP_SLUG:-}
      GITHUB_APP_INSTALL_URL: ${GITHUB_APP_INSTALL_URL:-}
      # Gitee SaaS：默认开启；需关闭时设 SAAS_DISABLE_GITEE=1 或 SAAS_ENABLE_GITEE=0
      SAAS_DISABLE_GITEE: ${SAAS_DISABLE_GITEE:-}
      SAAS_ENABLE_GITEE: ${SAAS_ENABLE_GITEE:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      WEBHOOK_LLM_PROVIDER: ${WEBHOOK_LLM_PROVIDER:-}
    volumes:
      - ./static:/app/static:ro
    restart: unless-stopped

  prelaunch-api:
    profiles:
      - prelaunch
    build:
      context: .
      dockerfile: Dockerfile.prelaunch
      args:
        USE_CN_APT_MIRROR: ${USE_CN_APT_MIRROR:-}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
    image: ai-pr-review-prelaunch:latest
    container_name: ai-pr-review-prelaunch
    ports:
      - "${PRELAUNCH_HOST_PORT:-8002}:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      PRELAUNCH_WORKSPACE: ${PRELAUNCH_WORKSPACE:-/tmp/prelaunch}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
    restart: unless-stopped
