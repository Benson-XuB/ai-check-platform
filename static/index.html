<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI PR Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0ebe3;
      --ink: #1c1917;
      --muted: #57534e;
      --faint: #78716c;
      --accent: #134e4a;
      --accent-h: #0f766e;
      --card: #ffffff;
      --border: rgba(28, 25, 23, 0.1);
      --shadow: 0 12px 40px -12px rgba(28, 25, 23, 0.12);
      --gitee: #c71d23;
      --github: #24292f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      font-size: 15px; line-height: 1.55; color: var(--ink);
      background: var(--bg);
      background-image: radial-gradient(ellipse 120% 80% at 20% -20%, rgba(19, 78, 74, 0.06), transparent 50%);
    }
    .wrap { max-width: 420px; margin: 0 auto; padding: 2.5rem 1.25rem 3rem; }
    h1 {
      font-family: Fraunces, Georgia, serif;
      font-size: clamp(1.75rem, 5vw, 2rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 0.5rem;
    }
    .lede { color: var(--muted); margin: 0 0 1.75rem; font-size: 0.95rem; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 1.35rem 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
    }
    .card h2 {
      font-family: Fraunces, Georgia, serif;
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 1rem;
    }
    .oauth-btn {
      display: block;
      width: 100%;
      text-align: center;
      padding: 0.85rem 1rem;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      color: #fff;
      margin-bottom: 0.65rem;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .oauth-btn.gitee { background: var(--gitee); }
    .oauth-btn.gitee:hover { filter: brightness(1.05); }
    .oauth-btn.github { background: var(--github); }
    .oauth-btn.github:hover { filter: brightness(1.05); }
    .hint {
      font-size: 0.8125rem;
      color: var(--faint);
      margin: 0.75rem 0 0;
      line-height: 1.45;
    }
    .hint a { color: var(--accent); font-weight: 600; }
    .hint code { font-size: 0.8em; background: #f5f5f4; padding: 0.1em 0.35em; border-radius: 4px; }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem 1rem;
      margin-top: 1.25rem;
      font-size: 0.8125rem;
    }
    .links a { color: var(--accent); font-weight: 600; text-decoration: none; border-bottom: 1px solid transparent; }
    .links a:hover { border-bottom-color: var(--accent); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>AI PR Review</h1>
    <p class="lede">使用代码托管账号登录并授权仓库后，合并请求将自动触发审查；报告在控制台查看。审查使用站点配置的模型与密钥，无需在页面填写 API Key 或 PR 链接。</p>

    <div class="card">
      <h2>登录</h2>
      <a class="oauth-btn gitee" href="/auth/gitee/login">使用 Gitee 登录</a>
      <a class="oauth-btn github" href="/auth/github/install">安装/连接 GitHub App</a>
      <p class="hint">GitHub：点击上方按钮安装 App 到你的组织/仓库，之后 PR 打开/更新会自动生成报告并在 PR 上显示 Check；在控制台点 <strong>Agree</strong> 才会回写评论到 PR。Gitee 仍可用（SaaS 默认关闭需手动开启）。</p>
    </div>

    <p class="hint" style="margin:0;">已登录？打开 <a href="/app">GitHub 控制台</a> 或 <a href="/app-gitee">Gitee 控制台</a> 查看报告。</p>

    <div class="links">
      <a href="/manual">手动审查（高级）</a>
      <a href="/prelaunch">Prelaunch 扫描</a>
    </div>
  </div>
</body>
</html>
