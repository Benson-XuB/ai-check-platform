<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>模型与密钥 · Gitee · AI PR Review</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 880px; margin: 2rem auto; padding: 0 1rem; color: #1c1917; }
    h1 { font-size: 1.35rem; margin: 0 0 0.5rem; }
    .sub { color: #57534e; font-size: 0.9rem; margin-bottom: 1.5rem; }
    a { color: #134e4a; font-weight: 600; }
    a.login-link {
      display: inline-block; padding: 0.5rem 1rem; background: #c71d23; color: #fff !important;
      text-decoration: none; border-radius: 8px;
    }
    .card { border: 1px solid #e7e5e4; border-radius: 10px; padding: 1rem 1.1rem; margin-bottom: 1rem; background: #fff; }
    button {
      padding: 0.5rem 1rem; font-weight: 600; cursor: pointer; border: none; border-radius: 8px;
      background: #c71d23; color: #fff; margin-right: 0.5rem; margin-top: 0.25rem;
    }
    button.secondary { background: #e7e5e4; color: #1c1917; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .meta { font-size: 0.8rem; color: #78716c; }
    .err { color: #b91c1c; font-size: 0.9rem; }
    .badge { font-size: 0.7rem; font-weight: 700; padding: 0.15rem 0.45rem; border-radius: 4px; white-space: nowrap; display: inline-block; vertical-align: middle; }
    .badge-ok { background: #d1fae5; color: #065f46; }
    input.llm-in, select.llm-in { width: 100%; max-width: 28rem; padding: 0.45rem 0.5rem; border: 1px solid #e7e5e4; border-radius: 8px; font: inherit; box-sizing: border-box; }
    .llm-row { margin: 0.5rem 0; }
    .llm-t-wrap {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-top: 0.5rem;
      border: 1px solid #e7e5e4;
      border-radius: 10px;
      background: #fafaf9;
    }
    table.llm-t {
      width: 100%;
      min-width: 640px;
      border-collapse: collapse;
      font-size: 0.875rem;
      background: #fff;
    }
    table.llm-t thead th {
      text-align: left;
      padding: 0.55rem 0.75rem;
      font-weight: 600;
      color: #44403c;
      white-space: nowrap;
      border-bottom: 1px solid #e7e5e4;
      background: #fafaf9;
    }
    table.llm-t tbody td {
      text-align: left;
      padding: 0.65rem 0.75rem;
      border-bottom: 1px solid #f0ebe7;
      vertical-align: middle;
    }
    table.llm-t tbody tr:last-child td { border-bottom: none; }
    .llm-col-model { min-width: 0; max-width: 26rem; }
    .llm-model-cell {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.4rem;
      line-height: 1.45;
    }
    .llm-model-text {
      flex: 1 1 12rem;
      min-width: 0;
      word-break: break-word;
    }
    .llm-col-note {
      width: 9rem;
      max-width: 12rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #57534e;
    }
    .llm-col-actions {
      width: 1%;
      white-space: nowrap;
      text-align: right;
    }
    .llm-actions {
      display: inline-flex;
      flex-wrap: nowrap;
      gap: 0.35rem;
      justify-content: flex-end;
      align-items: center;
    }
    button.llm-row-btn {
      margin: 0;
      padding: 0.4rem 0.65rem;
      font-size: 0.8125rem;
      white-space: nowrap;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <h1>审查用模型与 API Key</h1>
  <p class="sub">填写<strong>自定义 HTTPS Base URL + 模型名</strong>与 API Key（保存前可测试连通性；保存时会探测走 Anthropic 还是 LiteLLM）。设为默认后 WebHook 优先使用；未配置时回退站点环境变量。浏览器里「测试」接口 HTTP 多为 200，若 JSON 提示 <code>401</code>，一般是<strong>上游模型服务</strong>拒绝密钥，不是本站会话失效。</p>
  <p class="sub"><a href="/app-gitee">←返回 Gitee 概览</a> · <a href="/">首页</a> · <a href="/app">GitHub 控制台</a></p>

  <div id="gate" class="card"></div>
  <div id="llmBody" class="card meta" style="display:none;">加载中…</div>

  <script>
    const API = "";
    let llmTestInFlight = false;
    function setLlmTestUiBusy(busy) {
      llmTestInFlight = busy;
      const n = document.getElementById("llmTestNew");
      if (n) n.disabled = busy;
      document.querySelectorAll("button[data-act='test']").forEach((b) => {
        b.disabled = busy;
      });
    }

    async function j(url, opt) {
      const r = await fetch(API + url, { credentials: "include", ...opt });
      return r.json();
    }

    async function renderLlmPanel() {
      const box = document.getElementById("llmBody");
      box.style.display = "block";
      try {
        const cr = await j("/api/saas/llm/credentials");
        if (!cr.ok) {
          box.innerHTML = "<span class='err'>无法加载凭证: " + (cr.detail || cr.error || "") + "</span>";
          return;
        }
        const items = (cr.data && cr.data.items) || [];
        const esc = (s) => String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/"/g, "&quot;");
        let rows = items.map((it) => {
          const badge = it.is_active ? "<span class='badge badge-ok'>默认</span>" : "";
          const labelRaw = (it.label || "").trim();
          const noteCell = labelRaw
            ? "<td class='llm-col-note' title=\"" + esc(labelRaw) + "\">" + esc(labelRaw) + "</td>"
            : "<td class='llm-col-note'>—</td>";
          const btns =
            "<div class='llm-actions'>" +
            "<button type='button' class='secondary llm-row-btn' data-act='use' data-id=\"" + it.id + "\">设为默认</button>" +
            "<button type='button' class='secondary llm-row-btn' data-act='test' data-id=\"" + it.id + "\">测试</button>" +
            "<button type='button' class='secondary llm-row-btn' data-act='del' data-id=\"" + it.id + "\">删除</button>" +
            "</div>";
          return (
            "<tr><td class='llm-col-model'><div class='llm-model-cell'><span class='llm-model-text'>" +
            esc(it.display_label || "") +
            "</span>" +
            badge +
            "</div></td>" +
            noteCell +
            "<td class='llm-col-actions'>" +
            btns +
            "</td></tr>"
          );
        }).join("");
        box.className = "card";
        box.innerHTML =
          "<div class='llm-row'><label>自定义 Base URL（HTTPS）<br><input id='customBase' class='llm-in' type='url' placeholder='https://api.example.com/v1 或根路径'></label></div>" +
          "<div class='llm-row'><label>自定义模型名<br><input id='customModel' class='llm-in' type='text' placeholder='如 kimi-for-coding'></label></div>" +
          "<div class='llm-row'><label>备注（可选）<br><input id='llmLabel' class='llm-in' type='text' placeholder='例如：公司账号'></label></div>" +
          "<div class='llm-row'><label>API Key<br><input id='llmKey' class='llm-in' type='password' autocomplete='off' placeholder='保存后仅显示为已配置'></label></div>" +
          "<div class='llm-row'><button type='button' id='llmTestNew'>测试（未保存）</button> <button type='button' id='llmSave'>保存</button> <span id='llmMsg' class='meta'></span></div>" +
          "<h3 style='margin:1rem 0 0.35rem;font-size:0.95rem;'>已保存</h3>" +
          "<div class='llm-t-wrap'><table class='llm-t'><thead><tr><th>模型</th><th>备注</th><th style='text-align:right;'>操作</th></tr></thead><tbody>" +
          (rows || "<tr><td colspan='3' class='meta' style='padding:0.75rem;'>暂无，请先保存一条</td></tr>") + "</tbody></table></div>";
        const msg = (t, err) => {
          const el = document.getElementById("llmMsg");
          el.textContent = t || "";
          el.className = err ? "err" : "meta";
        };
        document.getElementById("llmTestNew").onclick = async () => {
          if (llmTestInFlight) return;
          const api_key = document.getElementById("llmKey").value;
          const custom_base_url = (document.getElementById("customBase") || {}).value || "";
          const custom_model = (document.getElementById("customModel") || {}).value || "";
          if (!custom_base_url.trim() || !custom_model.trim() || !api_key.trim()) {
            msg("请填写 Base URL、模型名与 API Key", true);
            return;
          }
          setLlmTestUiBusy(true);
          msg("测试中…");
          try {
            const body = {
              api_key,
              custom_base_url: custom_base_url.trim(),
              custom_model: custom_model.trim(),
            };
            const r = await j("/api/saas/llm/credentials/test", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
            msg(r.ok ? "测试通过" : ("失败: " + (r.error || r.detail || "")), !r.ok);
          } finally {
            setLlmTestUiBusy(false);
          }
        };
        document.getElementById("llmSave").onclick = async () => {
          const api_key = document.getElementById("llmKey").value;
          const label = document.getElementById("llmLabel").value;
          const custom_base_url = (document.getElementById("customBase") || {}).value || "";
          const custom_model = (document.getElementById("customModel") || {}).value || "";
          if (!custom_base_url.trim() || !custom_model.trim()) {
            msg("请填写 Base URL 与模型名", true);
            return;
          }
          if (!api_key.trim()) {
            msg("请填写 API Key", true);
            return;
          }
          msg("保存中…");
          const payload = {
            api_key,
            label,
            custom_base_url: custom_base_url.trim(),
            custom_model: custom_model.trim(),
          };
          const r = await j("/api/saas/llm/credentials", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          if (!r.ok) {
            msg("保存失败: " + (r.detail || r.error || ""), true);
            return;
          }
          document.getElementById("llmKey").value = "";
          msg("已保存");
          await renderLlmPanel();
        };
        box.querySelectorAll("button[data-act]").forEach((btn) => {
          btn.onclick = async () => {
            const id = parseInt(btn.getAttribute("data-id"), 10);
            const act = btn.getAttribute("data-act");
            if (act === "del") {
              if (!confirm("删除该条凭证？")) return;
              await j("/api/saas/llm/credentials/" + id, { method: "DELETE" });
              await renderLlmPanel();
              return;
            }
            if (act === "use") {
              await j("/api/saas/llm/credentials/" + id + "/activate", { method: "POST" });
              await renderLlmPanel();
              return;
            }
            if (act === "test") {
              if (llmTestInFlight) return;
              setLlmTestUiBusy(true);
              msg("测试中…");
              try {
                const r = await j("/api/saas/llm/credentials/test", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ credential_id: id }),
                });
                msg(r.ok ? "测试通过" : ("失败: " + (r.error || r.detail || "")), !r.ok);
              } finally {
                setLlmTestUiBusy(false);
              }
            }
          };
        });
      } catch (e) {
        box.innerHTML = "<span class='err'>加载失败</span>";
      }
    }

    async function init() {
      const gate = document.getElementById("gate");
      const me = await j("/api/saas/gitee/me");
      if (!me.authenticated) {
        gate.innerHTML = "<p>请先 <a class='login-link' href='/auth/gitee/login'>使用 Gitee 登录</a> 后再配置模型与密钥。</p>";
        return;
      }
      gate.innerHTML = "<p class='meta'>已登录 Gitee。配置将保存在当前账号下。</p>";
      await renderLlmPanel();
    }

    init();
  </script>
</body>
</html>
