<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <title>Gitee 审查控制台 · AI PR Review</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: min(1100px, 100% - 2rem); margin: 2rem auto; padding: 0 1rem; color: #1c1917; }
    h1 { font-size: 1.35rem; margin: 0 0 0.5rem; }
    .sub { color: #57534e; font-size: 0.9rem; margin-bottom: 1.5rem; }
    a { color: #134e4a; font-weight: 600; }
    a.login-link {
      display: inline-block; padding: 0.5rem 1rem; background: #c71d23; color: #fff !important;
      text-decoration: none; border-radius: 8px;
    }
    .card { border: 1px solid #e7e5e4; border-radius: 10px; padding: 1rem 1.1rem; margin-bottom: 1rem; background: #fff; }
    button {
      padding: 0.5rem 1rem; font-weight: 600; cursor: pointer; border: none; border-radius: 8px;
      background: #c71d23; color: #fff; margin-right: 0.5rem; margin-top: 0.25rem;
    }
    button.secondary { background: #e7e5e4; color: #1c1917; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    ul.reports { list-style: none; padding: 0; margin: 0; }
    ul.reports li {
      border-bottom: 1px solid #f5f5f4; padding: 0.65rem 0; cursor: pointer;
    }
    ul.reports li:hover { background: #fafaf9; margin: 0 -0.5rem; padding-left: 0.5rem; padding-right: 0.5rem; }
    .meta { font-size: 0.8rem; color: #78716c; }
    .err { color: #b91c1c; font-size: 0.9rem; }
    pre.detail { white-space: pre-wrap; font-size: 0.8rem; background: #f5f5f4; padding: 0.75rem; border-radius: 8px; max-height: 50vh; overflow: auto; }
    .badge { font-size: 0.7rem; font-weight: 700; padding: 0.15rem 0.4rem; border-radius: 4px; margin-right: 0.35rem; }
    .badge-ok { background: #d1fae5; color: #065f46; }
    .badge-fail { background: #fee2e2; color: #991b1b; }
    table.findings {
      width: 100%;
      table-layout: fixed;
      border-collapse: collapse;
      font-size: 0.8125rem;
      margin-top: 0.5rem;
    }
    table.findings th, table.findings td { border: 1px solid #e7e5e4; padding: 0.5rem 0.45rem; vertical-align: top; text-align: left; }
    table.findings th { background: #fafaf9; font-weight: 600; }
    table.findings tr.posted { background: #f0fdf4; }
    table.findings tr.rejected { opacity: 0.55; }
    table.findings th:nth-child(1), table.findings td:nth-child(1) { width: 4%; }
    table.findings th:nth-child(2), table.findings td:nth-child(2) { width: 8%; }
    table.findings th:nth-child(3), table.findings td:nth-child(3) { width: 9%; }
    table.findings th:nth-child(4), table.findings td:nth-child(4) { width: 14%; word-break: break-all; }
    table.findings th:nth-child(5), table.findings td:nth-child(5) { width: 5%; }
    table.findings th:nth-child(6), table.findings td:nth-child(6) {
      width: 48%;
      min-width: 12rem;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.45;
    }
    table.findings th:nth-child(7), table.findings td:nth-child(7) { width: 12%; }
    table.findings td.cell-actions { white-space: nowrap; }
    table.findings td.cell-actions button { margin-top: 0; margin-bottom: 0.25rem; display: inline-block; }
    table.findings code { font-size: 0.78rem; background: #f5f5f4; padding: 0.1em 0.25em; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Gitee 审查控制台</h1>
  <p class="sub">使用 Gitee 登录并「同步 WebHook」后，有权限的仓库在合并请求打开/更新时会自动审查；下方仅展示<strong>最近几条</strong>报告，完整列表在 <a href="/app-gitee/reports">报告归档页</a>。默认已开启 Gitee SaaS；若需关闭请设 <code>SAAS_DISABLE_GITEE=1</code> 或 <code>SAAS_ENABLE_GITEE=0</code>。</p>
  <p class="sub"><a href="/">返回首页</a> · <a href="/app-gitee/reports">全部审查报告</a>（分页） · <a href="/app-gitee/llm">模型与密钥</a> · <a href="/app-gitee/onboarding">补审已有 Open MR</a></p>

  <div id="auth" class="card"></div>
  <div id="reports" class="card" style="display:none;">
    <h2 style="margin:0 0 0.75rem;font-size:1rem;">最近报告</h2>
    <ul class="reports" id="reportList"></ul>
    <p id="reportMore" class="meta" style="margin:0.75rem 0 0;display:none;"></p>
    <div id="detail" style="margin-top:1rem;display:none;"></div>
  </div>

  <script>
    const API = "";
    const RECENT_REPORTS = 8;

    async function j(url, opt) {
      const r = await fetch(API + url, { credentials: "include", ...opt });
      return r.json();
    }

    async function refresh() {
      const authEl = document.getElementById("auth");
      const me = await j("/api/saas/gitee/me");
      if (!me.authenticated) {
        authEl.innerHTML = `
          <p>尚未登录。</p>
          <p><a class="login-link" href="/auth/gitee/login">使用 Gitee 登录</a></p>
        `;
        document.getElementById("reports").style.display = "none";
        return;
      }
      const u = me.user;
      authEl.innerHTML = `
        <p><strong>@${u.gitee_login}</strong>（用户 id: ${u.id}）</p>
        <p class="meta">已为 ${u.watched_repos} 个仓库登记同步记录；点下方按钮会为你有权限的仓库注册合并请求 WebHook（已存在则跳过）。</p>
        <button type="button" id="btnSync">同步 WebHook 到仓库</button>
        <button type="button" class="secondary" id="btnOut">退出登录</button>
        <p id="syncMsg" class="meta" style="margin-top:0.75rem;"></p>
      `;
      document.getElementById("btnSync").onclick = async () => {
        const btn = document.getElementById("btnSync");
        const msg = document.getElementById("syncMsg");
        btn.disabled = true;
        msg.textContent = "同步中…";
        const res = await j("/api/saas/gitee/sync-hooks", { method: "POST" });
        btn.disabled = false;
        if (!res.ok) {
          msg.textContent = "失败: " + (res.error || res.detail || "未知错误");
          msg.className = "err";
          return;
        }
        msg.className = "meta";
        const d = res.data || {};
        msg.textContent = "新增 " + (d.added || 0) + "，跳过 " + (d.skipped || 0) + "，失败 " + (d.failed || 0) + "。Hook URL: " + (d.hook_url || "");
        refresh();
      };
      document.getElementById("btnOut").onclick = async () => {
        await j("/auth/logout", { method: "POST" });
        refresh();
      };

      document.getElementById("reports").style.display = "block";
      const list = await j("/api/saas/gitee/reports?limit=" + RECENT_REPORTS);
      const ul = document.getElementById("reportList");
      ul.innerHTML = "";
      const items = (list.data && list.data.items) || [];
      const total = (list.data && typeof list.data.total === "number") ? list.data.total : items.length;
      const moreEl = document.getElementById("reportMore");
      if (total > RECENT_REPORTS) {
        moreEl.style.display = "block";
        moreEl.innerHTML = "共有 <strong>" + total + "</strong> 条记录，此处仅显示最近 " + RECENT_REPORTS +
          " 条。<a href=\"/app-gitee/reports\">查看全部报告 →</a>";
      } else {
        moreEl.style.display = "none";
        moreEl.innerHTML = "";
      }
      if (!items.length) {
        ul.innerHTML = "<li class='meta'>暂无报告；在 Gitee 打开新的合并请求后会自动生成。</li>";
      } else {
        items.forEach((it) => {
          const li = document.createElement("li");
          const b = it.status === "completed"
            ? "<span class='badge badge-ok'>完成</span>"
            : "<span class='badge badge-fail'>失败</span>";
          li.innerHTML = b + "<strong>" + it.path_with_namespace + "</strong> PR #" + it.pr_number +
            "<div class='meta'>" + (it.created_at || "") + " · " + (it.pr_title || "") + "</div>";
          li.onclick = () => loadDetail(it.id);
          ul.appendChild(li);
        });
      }
      document.getElementById("detail").style.display = "none";
    }

    function escHtml(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    async function postGiteeReportComment(reportId, idx, btn) {
      btn.disabled = true;
      const r = await fetch(API + "/api/saas/gitee/reports/" + reportId + "/post-comment", {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ comment_index: idx }),
      });
      let data = {};
      try {
        data = await r.json();
      } catch (_) {}
      if (!r.ok || !data.ok) {
        const msg = data.detail
          ? (typeof data.detail === "string" ? data.detail : JSON.stringify(data.detail))
          : (data.error || "发帖失败");
        alert(msg);
        btn.disabled = false;
        return;
      }
      const tr = btn.closest("tr");
      tr.classList.remove("rejected");
      tr.classList.add("posted");
      tr.querySelector(".cell-actions").innerHTML = "<span class='meta'>已发帖</span>";
    }

    function wireGiteeCommentRows(reportId, rootEl) {
      rootEl.querySelectorAll(".btn-agree").forEach((btn) => {
        btn.onclick = () => postGiteeReportComment(reportId, parseInt(btn.dataset.idx, 10), btn);
      });
      rootEl.querySelectorAll(".btn-reject").forEach((btn) => {
        btn.onclick = () => {
          const tr = btn.closest("tr");
          tr.classList.add("rejected");
          tr.querySelector(".cell-actions").innerHTML = "<span class='meta'>已跳过</span>";
        };
      });
    }

    function renderGiteeCommentsTable(d, reportId) {
      const comments = (d.result && Array.isArray(d.result.comments)) ? d.result.comments : [];
      const posted = new Set((d.posted_comment_indexes || []).map((x) => parseInt(x, 10)));
      if (!comments.length) {
        if (d.result && typeof d.result === "object") {
          return "<p class='meta'>无结构化意见</p><pre class='detail'>" + escHtml(JSON.stringify(d.result, null, 2)) + "</pre>";
        }
        return "";
      }
      let html = "<p>共 <strong>" + comments.length + "</strong> 条 · 同意发回合并请求或不同意跳过</p>";
      html += "<table class='findings'><thead><tr>";
      html += "<th>#</th><th>级别</th><th>类别</th><th>文件</th><th>行</th><th>意见</th><th>操作</th>";
      html += "</tr></thead><tbody>";
      comments.forEach((c, idx) => {
        const isPosted = posted.has(idx);
        const sug = (c.suggestion || c.content || "").trim();
        html += "<tr class='" + (isPosted ? "posted" : "") + "'>";
        html += "<td>" + (idx + 1) + "</td>";
        html += "<td>" + escHtml(c.severity || "") + "</td>";
        html += "<td>" + escHtml(c.category || "") + "</td>";
        html += "<td><code>" + escHtml(c.file || "") + "</code></td>";
        html += "<td>" + (c.line != null && c.line !== "" ? escHtml(String(c.line)) : "—") + "</td>";
        html += "<td class='cell-suggestion'>" + escHtml(sug) + "</td>";
        html += "<td class='cell-actions'>";
        if (isPosted) {
          html += "<span class='meta'>已发帖</span>";
        } else {
          html += "<button type='button' data-idx='" + idx + "' class='btn-agree'>同意</button> ";
          html += "<button type='button' data-idx='" + idx + "' class='secondary btn-reject'>不同意</button>";
        }
        html += "</td></tr>";
      });
      html += "</tbody></table>";
      const wrap = document.createElement("div");
      wrap.innerHTML = html;
      wireGiteeCommentRows(reportId, wrap);
      return wrap;
    }

    async function loadDetail(id) {
      const dEl = document.getElementById("detail");
      dEl.style.display = "block";
      dEl.innerHTML = "加载中…";
      const r = await j("/api/saas/gitee/reports/" + id);
      if (!r.ok || !r.data) {
        dEl.innerHTML = "<p class='err'>加载失败</p>";
        return;
      }
      const d = r.data;
      dEl.innerHTML = "";
      const head = document.createElement("div");
      head.innerHTML = "<p><strong>" + escHtml(d.path_with_namespace) + "</strong> PR #" + escHtml(String(d.pr_number)) + "</p>";
      if (d.error) head.innerHTML += "<p class='err'>" + escHtml(d.error) + "</p>";
      dEl.appendChild(head);
      const tableHost = renderGiteeCommentsTable(d, id);
      if (typeof tableHost === "string") {
        const rest = document.createElement("div");
        rest.innerHTML = tableHost;
        dEl.appendChild(rest);
      } else if (tableHost) {
        dEl.appendChild(tableHost);
      }
    }

    refresh();
  </script>
</body>
</html>
